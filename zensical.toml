[project]
site_name = "s_spatioloji"
site_url = "https://gynecoloji.github.io/s_spatioloji/"
repo_url = "https://github.com/{{ cookiecutter.github_username }}/{{ cookiecutter.project_slug }}"
repo_name = "{{ cookiecutter.github_username }}/{{ cookiecutter.project_slug }}"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
